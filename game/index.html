<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>엘레베이터 기다리는게임</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>

  <!-- ════════════════════ GAME ════════════════════ -->
  <div id="game">

    <!-- ── 상단 바: 분노 게이지(중앙) + 10F(우상단) + 타이머(좌) ── -->
    <div id="top-bar">
      <div id="timer-wrap">
        <span id="timer-value">60</span>
        <span id="timer-unit">초</span>
      </div>

      <div id="rage-section">
        <div id="rage-label-row">
          <span id="rage-label">분노</span>
          <span id="rage-value">0<span id="rage-max">/100</span></span>
        </div>
        <div id="rage-track">
          <div id="rage-bar"></div>
        </div>
      </div>

      <!-- 10F 실물 표시판 -->
      <div id="floor-sign">
        <div id="floor-sign-inner">
          <span id="floor-number">10</span><span id="floor-unit">F</span>
        </div>
      </div>
    </div>

    <!-- ── 엘리베이터 영역: 화면 꽉 채움 ── -->
    <div id="elevator-row">

      <!-- 엘베 A -->
      <div class="elev-unit" id="elev-a">
        <div class="floor-display" id="disp-a">
          <span class="floor-disp-text" id="disp-a-text">B2</span>
        </div>
        <div class="door-frame" id="frame-a">
          <!-- 만원 군중 (이벤트1, 문 뒤에 숨어있다 열릴 때 노출) -->
          <div class="crowd hidden" id="crowd-a">
            <div class="person" style="height:58%;--skin:#E8B898;--hair:#3A2010;--shirt:#3A5A90;--pants:#1A1A2E">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
            <div class="person" style="height:63%;--skin:#C87848;--hair:#180C08;--shirt:#8A3828;--pants:#2A2A3A">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
            <div class="person" style="height:60%;--skin:#D4A070;--hair:#2A2018;--shirt:#2A5040;--pants:#1E2A40">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
            <div class="person" style="height:56%;--skin:#F0D0B0;--hair:#4A3020;--shirt:#5A3878;--pants:#141428">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
            <div class="person" style="height:61%;--skin:#A06840;--hair:#0A0808;--shirt:#1A3060;--pants:#382810">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
          </div>
          <div class="door-half door-l" id="door-a-l"></div>
          <div class="door-seam"></div>
          <div class="door-half door-r" id="door-a-r"></div>
          <div class="door-badge hidden" id="badge-a"></div>
          <!-- 동료들 (이벤트4, 문 열리면 우르르 탑승) -->
          <div class="crowd hidden" id="crowd-b">
            <div class="person" style="height:59%;--skin:#D4B090;--hair:#280C08;--shirt:#487840;--pants:#1E1E2E">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
            <div class="person" style="height:62%;--skin:#F4D8B8;--hair:#6A4820;--shirt:#983820;--pants:#2E2018">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
            <div class="person" style="height:57%;--skin:#B07040;--hair:#100808;--shirt:#205880;--pants:#280818">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
            <div class="person" style="height:64%;--skin:#E8C8A0;--hair:#3A2808;--shirt:#704880;--pants:#1A1420">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
            <div class="person" style="height:60%;--skin:#907060;--hair:#080608;--shirt:#386840;--pants:#1A2A18">
              <svg viewBox="0 0 40 100" preserveAspectRatio="xMidYMax meet"><ellipse cx="20" cy="6" rx="11" ry="8" fill="var(--hair)"/><circle cx="20" cy="13" r="11" fill="var(--skin)"/><rect x="17" y="22" width="6" height="6" fill="var(--skin)"/><rect x="9" y="28" width="22" height="22" rx="3" fill="var(--shirt)"/><rect x="2" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><rect x="30" y="29" width="8" height="18" rx="4" fill="var(--shirt)"/><ellipse cx="6" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><ellipse cx="34" cy="48" rx="4.5" ry="3.5" fill="var(--skin)"/><rect x="10" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><rect x="21" y="49" width="10" height="35" rx="3" fill="var(--pants)"/><ellipse cx="15" cy="87" rx="8" ry="5" fill="#222"/><ellipse cx="26" cy="87" rx="8" ry="5" fill="#222"/></svg>
            </div>
          </div>
        </div>
        <div class="elev-label">엘베 A</div>
      </div>

      <!-- 엘베 B -->
      <div class="elev-unit" id="elev-b">
        <div class="floor-display" id="disp-b">
          <span class="floor-disp-text" id="disp-b-text">9F</span>
        </div>
        <div class="door-frame" id="frame-b">
          <div class="door-half door-l" id="door-b-l"></div>
          <div class="door-seam"></div>
          <div class="door-half door-r" id="door-b-r"></div>
          <div class="door-badge hidden" id="badge-b"></div>
        </div>
        <div class="elev-label">엘베 B</div>
      </div>

      <!-- 엘베 C -->
      <div class="elev-unit" id="elev-c">
        <div class="floor-display" id="disp-c">
          <span class="floor-disp-text" id="disp-c-text">1F</span>
        </div>
        <div class="door-frame" id="frame-c">
          <div class="door-half door-l" id="door-c-l"></div>
          <div class="door-seam"></div>
          <div class="door-half door-r" id="door-c-r"></div>
          <div class="door-badge hidden" id="badge-c"></div>
        </div>
        <div class="elev-label">엘베 C</div>
      </div>

    </div>
    <!-- /elevator-row -->

    <!-- ── 하단 바: 상태텍스트 + 호출 버튼 ── -->
    <div id="bottom-bar">
      <div id="status-text">엘레베이터를 부르세요</div>
      <div id="btn-area">
        <div id="urgent-msg" class="hidden">빨리 눌러요!</div>
        <div id="call-row">
          <div id="arrow-left" class="btn-arrows">
            <span>◀</span><span>◀</span><span>◀</span>
          </div>
          <button id="call-btn" class="idle">호출</button>
          <div id="arrow-right" class="btn-arrows">
            <span>▶</span><span>▶</span><span>▶</span>
          </div>
        </div>
      </div>
    </div>

  </div>
  <!-- /game -->

  <!-- ════════════════════ END SCREEN ════════════════════ -->
  <div id="end-screen" class="hidden">
    <!-- TODO: 엔딩 연출 (캐릭터, 로고 등) 추가 예정 -->
    <div id="end-box">
      <h1 id="end-title">게임 종료</h1>
      <!-- TODO: 결과 스탯 추가 예정 -->
      <button id="restart-btn">다시 시작</button>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/player.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
